<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEGA Registrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="screen-auth" class="screen">
            <h2>Авторизация</h2>
            <input type="text" id="login" placeholder="Логин" autocomplete="off">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="auth()">Подключиться</button>
        </div>

        <div id="screen-task" class="screen" style="display:none;">
            <h2>Введите номер задания</h2>
            <input type="text" id="order-number" placeholder="Номер заказа" autocomplete="off">
            <button onclick="getTask()">Получить план</button>
        </div>

        <div id="screen-scan" class="screen" style="display:none;">
            <h3 id="item-name">Сканируйте паллету</h3>
            <input type="text" id="pallet-input" placeholder="Паллетный лист" autofocus>
            <input type="text" id="sscc-input" placeholder="SSCC код" style="display:none;">
            <div id="stats">
                <p>Всего паллет: <span id="stat-count">0</span></p>
            </div>
            <button onclick="confirmShipment()">Отправить отгрузку</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
